name: Daily AXScout Data Refresh

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ax-scout-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Run data pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SEASON_START_DATE: "2026-03-27"
      ENABLE_TEAM_WEEKLY_STATCAST: "true"
      ENABLE_TEAM_OFFENSE_SEASON: "true"
      ENABLE_TEAM_ROLLING_7: "true"
      ENABLE_PLAYER_STATCAST: "true"
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ENABLE_ODDS: "true"
      ODDS_API_REGIONS: "us"
      ODDS_API_MARKETS: "h2h,spreads,totals"
      ODDS_API_ODDS_FORMAT: "american"
      ENABLE_PLAYER_ROLLING_7: "true"
      ENABLE_PITCHING_SUMMARY: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/data/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/data/requirements.txt

      - name: Run AXScout pipeline
        run: python -m scripts.pipeline
